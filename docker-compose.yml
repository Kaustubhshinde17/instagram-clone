version: '3.8'

services:
  # Database Layer: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: nextgen-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: instagram_secure_pass_2026
      POSTGRES_DB: instagram_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache & PubSub: Redis
  redis:
    image: redis:7-alpine
    container_name: nextgen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Message Broker: Zookeeper (Kafka Dependency)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: nextgen-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Message Broker: Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: nextgen-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # Search Engine: ElasticSearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    container_name: nextgen-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # Backend App Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgen-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:instagram_secure_pass_2026@postgres:5432/instagram_clone?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - JWT_SECRET=super_secret_jwt_key_for_instagram_2026
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_started

  # Frontend Web Client Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextgen-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  es_data:
