name: Build and Deploy Instagram NextGen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build, Lint, and Test the codebase
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: |
          backend/package.json
          frontend/package.json

    # Validate Backend
    - name: Install Backend Deps
      run: cd backend && npm install
    - name: Lint Backend
      run: cd backend && npm run lint
    - name: Test Backend
      run: cd backend && npm run test

    # Validate Frontend
    - name: Install Frontend Deps
      run: cd frontend && npm install
    - name: Build Frontend
      run: cd frontend && npm run build

  # Job 2: Build & Push Docker containers to AWS ECR
  publish:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Push Backend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/nextgen-backend:latest ./backend
        docker push $ECR_REGISTRY/nextgen-backend:latest

    - name: Build and Push Frontend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/nextgen-frontend:latest ./frontend
        docker push $ECR_REGISTRY/nextgen-frontend:latest

    - name: Update EKS Deployment
      run: |
        aws eks update-kubeconfig --name nextgen-cluster --region us-east-1
        kubectl rollout restart deployment/nextgen-backend -n instagram
        kubectl rollout restart deployment/nextgen-frontend -n instagram
